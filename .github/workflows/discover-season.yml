name: Discover Season Competitions

on:
  workflow_dispatch:
    inputs:
      season:
        description: 'CodTemporada (19=2023-2024, 18=2022-2023...)'
        required: true
        default: '19'

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright && playwright install chromium --with-deps
      - name: Discover competitions
        env:
          SEASON: ${{ github.event.inputs.season }}
        run: python3 scripts/discover_season.py
      - name: Guardar resultado
        if: always()
        env:
          SEASON_INPUT: ${{ github.event.inputs.season }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scripts/fiflp_discover_*.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "data: competition discovery for season ${SEASON_INPUT}"
            git push
          fi
