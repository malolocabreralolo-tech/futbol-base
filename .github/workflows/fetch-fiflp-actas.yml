name: Scrape FIFLP actas (incremental)
on:
  workflow_dispatch:
    inputs:
      temporada:
        description: 'CodTemporada (17=2021-22, 18=2022-23, 19=2023-24, 20=2024-25, 21=2025-26)'
        required: true
        type: choice
        options: ['17','18','19','20','21']
      comps:
        description: 'Optional: comma-separated comp IDs (override auto-discovery)'
        required: false
        default: ''
      do_import:
        description: 'Run import + generate_js after scraping'
        required: false
        type: boolean
        default: true
      max_actas:
        description: 'Optional cap on actas scraped this run (0 = unlimited; useful for spike runs)'
        required: false
        default: '0'
      dump_fixture:
        description: 'Optional CodActa to dump live HTML to scripts/tests/fixtures/ (diagnostic)'
        required: false
        default: ''
permissions:
  contents: write
concurrency:
  group: scrape-fiflp-actas-${{ inputs.temporada }}
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape actas (incremental, resumable)
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEMP_INPUT: ${{ inputs.temporada }}
          COMPS_INPUT: ${{ inputs.comps }}
          MAX_INPUT: ${{ inputs.max_actas }}
          DUMP_INPUT: ${{ inputs.dump_fixture }}
        run: |
          ARGS="--temporada $TEMP_INPUT"
          if [ -n "$COMPS_INPUT" ]; then ARGS="$ARGS --comps $COMPS_INPUT"; fi
          if [ "$MAX_INPUT" != "0" ] && [ -n "$MAX_INPUT" ]; then ARGS="$ARGS --max-actas $MAX_INPUT"; fi
          if [ -n "$DUMP_INPUT" ]; then ARGS="$ARGS --dump-fixture $DUMP_INPUT"; fi
          python3 scripts/fetch_fiflp_actas.py $ARGS
      - name: Import + generate (if requested)
        if: ${{ inputs.do_import == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEMP_INPUT: ${{ inputs.temporada }}
        run: |
          python3 scripts/migrate_actas_schema.py
          SEASON_LABEL=$(python3 -c "from scripts.fetch_fiflp_actas import SEASON_NAME; print(SEASON_NAME[\"$TEMP_INPUT\"])")
          RAW="scripts/fiflp_actas_${SEASON_LABEL}_raw.json"
          if [ -f "$RAW" ]; then
            python3 scripts/import_fiflp_actas.py "$RAW"
            python3 scripts/generate_js.py
          else
            echo "  ! no raw file at $RAW (scraper produced nothing); skipping import"
          fi
      - name: Tests (bloquean el commit si fallan)
        run: |
          pip install pytest pyyaml
          python3 -m pytest scripts/tests/ -q
          node --test scripts/tests/test_*.mjs

      - name: Commit
        env:
          PYTHONPATH: ${{ github.workspace }}
          TEMP_INPUT: ${{ inputs.temporada }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          shopt -s nullglob

          # Snapshot OUR raw_json + unmatched before any rebase/reset.
          # We may need to re-apply them on top of a fresh origin/main when
          # other parallel runs race us on the binary futbolbase.db.
          SEASON_LABEL=$(python3 -c "from scripts.fetch_fiflp_actas import SEASON_NAME; print(SEASON_NAME[\"$TEMP_INPUT\"])")
          RAW="scripts/fiflp_actas_${SEASON_LABEL}_raw.json"
          SNAPSHOT=/tmp/sp1-snap
          mkdir -p "$SNAPSHOT"
          [ -f "$RAW" ] && cp "$RAW" "$SNAPSHOT/" && echo "  snapshotted $RAW"
          [ -f scripts/fiflp_actas_unmatched.json ] && cp scripts/fiflp_actas_unmatched.json "$SNAPSHOT/"

          add_if_exists() {
            for f in "$@"; do
              [ -e "$f" ] && git add "$f"
            done
          }
          # generate_js.py reescribe TODOS los data-*.js (no solo lineups/
          # players), bumpea ?v= en index.html y CACHE_NAME en sw.js: hay que
          # stagear todos sus outputs o el runner los descarta.
          stage_all() {
            add_if_exists scripts/fiflp_actas_*_raw.json
            add_if_exists scripts/fiflp_actas_unmatched.json
            add_if_exists futbolbase.db
            add_if_exists data-*.js
            add_if_exists scripts/tests/fixtures/acta_*.html
            add_if_exists index.html
            add_if_exists sw.js
          }

          stage_all
          if git diff --cached --quiet; then
            echo "no changes to commit"
            exit 0
          fi
          git commit -m "chore(fiflp): actas season $TEMP_INPUT (scrape+import+generate)"

          # Push with retry. On failure (binary conflict on futbolbase.db when
          # parallel runs race), reset to fresh origin/main, restore our
          # snapshot raw_json, re-run import + generate, re-commit, push.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main 2>&1; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed on attempt $attempt — reconciling against fresh origin/main"
            git rebase --abort 2>/dev/null || true
            git fetch origin main
            git reset --hard origin/main
            # Restore our raw_json + unmatched on top of fresh origin
            cp "$SNAPSHOT"/*.json scripts/ 2>/dev/null || true
            python3 scripts/migrate_actas_schema.py
            if [ -f "$RAW" ]; then
              python3 scripts/import_fiflp_actas.py "$RAW"
              python3 scripts/generate_js.py
            fi
            stage_all
            if git diff --cached --quiet; then
              echo "After re-apply, no diff vs origin — our work is already there. Exiting clean."
              exit 0
            fi
            git commit -m "chore(fiflp): actas season $TEMP_INPUT (scrape+import+generate)"
            sleep $((attempt * 5))
          done
          echo "ERROR: failed to push after 5 attempts"
          exit 1
