name: Debug Season 19

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright && playwright install chromium --with-deps
      - run: python3 scripts/debug_season19.py
      - name: Guardar resultado
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scripts/debug_season19.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "debug: season 19 page structure"
            git push
          fi
