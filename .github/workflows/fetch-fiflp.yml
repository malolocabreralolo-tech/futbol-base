name: Scraping FIFLP

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'IDs de competición separados por coma (vacío = todas)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Benjamin + Prebenjamin 2024-2025
        env:
          SCRAPE_IDS: ${{ github.event.inputs.ids }}
        run: python3 scripts/fetch_fiflp_2425.py
        timeout-minutes: 50

      - name: Importar a DB y regenerar JS
        run: |
          python3 scripts/import_fiflp_2425.py
          python3 scripts/generate_js.py

      - name: Commit y push
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/fiflp_2425_raw.json futbolbase.db \
            data-benjamin.js data-prebenjamin.js data-seasons.js \
            data-history.js data-goleadores.js data-shields.js \
            data-stats.js data-matchdetail.js index.html
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git pull --rebase origin main
            git add scripts/fiflp_2425_raw.json futbolbase.db \
              data-benjamin.js data-prebenjamin.js data-seasons.js \
              data-history.js data-goleadores.js data-shields.js \
              data-stats.js data-matchdetail.js index.html
            git commit -m "data: FIFLP 2024-2025 con resultados completos"
            git push
          fi
