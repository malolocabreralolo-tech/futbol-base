name: _capture-acta-fixtures
on:
  push:
    branches: [worktree-fiflp-actas-pipeline]
    paths: ['.github/workflows/_capture-acta-fixtures.yml']
  workflow_dispatch:
permissions:
  contents: write
jobs:
  capture:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Capture acta HTML fixtures
        run: |
          mkdir -p scripts/tests/fixtures
          python3 - <<'PY'
          import re, os, sys
          from playwright.sync_api import sync_playwright
          BASE = "https://www.fiflp.com/pnfg/NPcd"
          UA = "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120 Safari/537"

          def capture(page, cod, label):
              url = f"{BASE}/NFG_CmpPartido?cod_primaria=1000120&CodActa={cod}&cod_acta={cod}"
              page.goto(url, wait_until="domcontentloaded", timeout=30000)
              page.wait_for_timeout(3500)
              html = page.content()
              for fr in page.frames:
                  if fr is page.main_frame: continue
                  try: html += "\n<!--FRAME " + fr.url + "-->\n" + fr.content()
                  except Exception: pass
              out = f"scripts/tests/fixtures/{label}.html"
              with open(out, "w", encoding="utf-8") as f: f.write(html)
              # crude season detection
              flat = re.sub(r"<[^>]+>", " ", html)
              m = re.search(r"TEMPORADA\s*[:\-]?\s*(\d{4}\s*/\s*\d{4})", flat, re.IGNORECASE)
              season = m.group(1).replace(" ","") if m else "?"
              print(f"  {label}: cod={cod} season={season} bytes={len(html)} -> {out}")
              return season

          ACTA_HREF = re.compile(r"NFG_CmpPartido[^\"'\s]*CodActa=(\d+)", re.IGNORECASE)

          def discover_one_acta(page, season_code, comp_id):
              """Enumerate one acta via main path for a known season+comp."""
              page.goto(f"{BASE}/NFG_CmpJornada?cod_primaria=1000120&CodTemporada={season_code}&CodCompeticion={comp_id}",
                        wait_until="domcontentloaded", timeout=30000)
              page.wait_for_timeout(2500)
              grupos = page.evaluate("""
                  () => Array.from(document.querySelectorAll('select[name="grupo"] option'))
                             .filter(o => o.value && o.value !== '0')
                             .map(o => o.value)""")
              for grupo in (grupos or [])[:2]:
                  page.evaluate(f"""
                      const s=document.querySelector('select[name="grupo"]');
                      s.value='{grupo}'; s.dispatchEvent(new Event('change'));
                  """)
                  page.wait_for_timeout(2000)
                  jornadas = page.evaluate("""
                      () => Array.from(document.querySelectorAll('select[name="jornada"] option'))
                                 .filter(o => o.value && o.value !== '0')
                                 .map(o => o.value)""")
                  for jornada in (jornadas or [])[:2]:
                      try:
                          page.evaluate(f"BuscarPartidos('{jornada}')")
                          page.wait_for_timeout(2000)
                      except Exception: continue
                      html = page.content()
                      m = ACTA_HREF.search(html)
                      if m:
                          return m.group(1)
              return None

          with sync_playwright() as p:
              br = p.chromium.launch(headless=True)
              ctx = br.new_context(user_agent=UA)
              page = ctx.new_page()

              # 1) Known modern fixture (2025-26 confirmed in discovery)
              s = capture(page, "190080", "acta_modern")
              if not s.startswith("2025"):
                  print(f"  ! WARN: acta_modern.html header says season={s}, expected 2025/2026")

              # 2) Discover one 2024-25 acta via main path (comp 1576 = Primera Benjamin GC)
              cod = discover_one_acta(page, "20", "1576")
              if cod:
                  capture(page, cod, "acta_2024_25")
              else:
                  print("  ! Could not enumerate a 2024-25 acta via comp 1576 main path")
                  sys.exit(2)

              br.close()
          PY
      - name: Commit fixtures
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/tests/fixtures/*.html
          if git diff --cached --quiet; then
            echo "no fixtures to commit"; exit 1
          fi
          git commit -m "test(fixtures): capture FIFLP acta HTML (modern + 2024-25) for parser TDD"
          git push
