name: Scraping FIFLP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Test scraping Benjamin Fase A G2 2024/2025
        run: python3 scripts/fetch_fiflp_test.py
        timeout-minutes: 10

      - name: Guardar resultado
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/fiflp_raw.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "test: FIFLP Benjamin Fase A G2 2024/2025"
            git push
          fi
