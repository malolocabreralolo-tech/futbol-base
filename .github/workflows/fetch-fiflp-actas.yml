name: Scrape FIFLP actas (incremental)
on:
  workflow_dispatch:
    inputs:
      temporada:
        description: 'CodTemporada (17=2021-22, 18=2022-23, 19=2023-24, 20=2024-25, 21=2025-26)'
        required: true
        type: choice
        options: ['17','18','19','20','21']
      comps:
        description: 'Optional: comma-separated comp IDs (override auto-discovery)'
        required: false
        default: ''
      do_import:
        description: 'Run import + generate_js after scraping'
        required: false
        type: boolean
        default: true
      max_actas:
        description: 'Optional cap on actas scraped this run (0 = unlimited; useful for spike runs)'
        required: false
        default: '0'
permissions:
  contents: write
concurrency:
  group: scrape-fiflp-actas-${{ github.ref }}
  cancel-in-progress: false
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps
      - name: Scrape actas (incremental, resumable)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          ARGS="--temporada ${{ inputs.temporada }}"
          if [ -n "${{ inputs.comps }}" ]; then ARGS="$ARGS --comps ${{ inputs.comps }}"; fi
          if [ "${{ inputs.max_actas }}" != "0" ] && [ -n "${{ inputs.max_actas }}" ]; then ARGS="$ARGS --max-actas ${{ inputs.max_actas }}"; fi
          python3 scripts/fetch_fiflp_actas.py $ARGS
      - name: Import + generate (if requested)
        if: ${{ inputs.do_import == true }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/migrate_actas_schema.py
          SEASON_LABEL=$(python3 -c "from scripts.fetch_fiflp_actas import SEASON_NAME; print(SEASON_NAME['${{ inputs.temporada }}'])")
          RAW="scripts/fiflp_actas_${SEASON_LABEL}_raw.json"
          if [ -f "$RAW" ]; then
            python3 scripts/import_fiflp_actas.py "$RAW"
            python3 scripts/generate_js.py
          else
            echo "  ! no raw file at $RAW (scraper produced nothing); skipping import"
          fi
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # Defensive: git add aborts atomically on the first unmatched pathspec,
          # so we add each pattern/path separately with shopt nullglob and an
          # existence check. Without this the raw JSON would be lost.
          shopt -s nullglob
          add_if_exists() {
            for f in "$@"; do
              [ -e "$f" ] && git add "$f"
            done
          }
          add_if_exists scripts/fiflp_actas_*_raw.json
          add_if_exists scripts/fiflp_actas_unmatched.json
          add_if_exists futbolbase.db
          add_if_exists data-lineups-*.js
          add_if_exists data-players-*.js
          add_if_exists index.html
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(fiflp): actas season ${{ inputs.temporada }} (scrape+import+generate)"
            git push
          fi
