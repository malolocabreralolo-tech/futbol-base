name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**.py'
      - 'futbolbase.db'
      - 'data-*.js'
      - '.github/workflows/tests.yml'
  pull_request:
    paths:
      - 'scripts/**.py'
      - 'futbolbase.db'
      - 'data-*.js'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python -m pytest scripts/tests/ -v
