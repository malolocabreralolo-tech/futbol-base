name: Actualización automática

on:
  schedule:
    - cron: '0 */6 * * *'   # Cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch:          # También se puede lanzar manualmente desde GitHub

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de test
        run: pip install pytest pyyaml

      - name: Actualizar datos desde futbolaspalmas.com
        run: python3 scripts/fetch_futbolaspalmas.py

      # Los push del bot (GITHUB_TOKEN) NO disparan tests.yml (anti-recursión
      # de GitHub), así que las suites tienen que correr AQUÍ, sobre los datos
      # recién generados y ANTES del commit: si fallan, el job sale rojo y no
      # se publica nada.
      - name: Tests Python (bloquean el commit si fallan)
        run: python3 -m pytest scripts/tests/ -q

      - name: Tests Node (bloquean el commit si fallan)
        run: node --test scripts/tests/test_*.mjs

      - name: Commit y push si hay cambios
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          # generate_js.py escribe data-*.js (incl. data-seasons.js y
          # data-season-*.js), bumpea ?v= en index.html y CACHE_NAME en sw.js:
          # se stagean TODOS sus outputs con glob estable.
          git add 'data-*.js' index.html sw.js futbolbase.db
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Actualización automática $(date '+%d/%m/%Y %H:%M UTC')"
            git push
          fi
