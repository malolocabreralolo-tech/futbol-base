name: Scraping FIFLP

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'IDs de competición separados por coma (vacío = todas)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Benjamin + Prebenjamin 2024-2025
        env:
          SCRAPE_IDS: ${{ github.event.inputs.ids }}
        run: python3 scripts/fetch_fiflp_2425.py
        timeout-minutes: 45

      - name: Guardar resultado
        if: always()
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/fiflp_2425_raw.json
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add scripts/fiflp_2425_raw.json
            git commit -m "data: FIFLP Benjamin+Prebenjamin 2024-2025"
            git push
          fi
