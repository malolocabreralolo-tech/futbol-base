name: Discover Wayback 2023-2024 URLs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python3 scripts/discover_wayback_2324.py
      - name: Guardar resultado
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scripts/wayback_2324_urls.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "data: wayback 2023-2024 URL discovery"
            git push
          fi
