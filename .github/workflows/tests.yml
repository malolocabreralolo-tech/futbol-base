name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**.py'
      - 'scripts/**.json'
      - 'scripts/**.sh'
      - 'scripts/tests/**'
      - 'futbolbase.db'
      - 'data-*.js'
      - 'src/**'
      - 'index.html'
      - 'style.css'
      - 'sw.js'
      - 'manifest.json'
      - '.github/workflows/tests.yml'
      - '.github/workflows/update.yml'
  pull_request:
    paths:
      - 'scripts/**.py'
      - 'scripts/**.json'
      - 'scripts/**.sh'
      - 'scripts/tests/**'
      - 'futbolbase.db'
      - 'data-*.js'
      - 'src/**'
      - 'index.html'
      - 'style.css'
      - 'sw.js'
      - 'manifest.json'
      - '.github/workflows/tests.yml'
      - '.github/workflows/update.yml'
  # Red de seguridad: los push del bot con GITHUB_TOKEN no disparan este
  # workflow (anti-recursión de GitHub), así que un cron diario garantiza
  # que las suites corren sobre main al menos una vez al día.
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest pyyaml
      - name: Run Python tests
        run: python -m pytest scripts/tests/ -v

  node-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run Node tests
        # Glob (contrato C5): coge todas las suites test_*.mjs presentes y
        # futuras (render-smoke.mjs no matchea, corre en su propio job).
        run: node --test scripts/tests/test_*.mjs

  render-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Render smoke (headless Chrome)
        run: node scripts/tests/render-smoke.mjs
