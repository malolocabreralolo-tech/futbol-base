name: Scraping FIFLP

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'IDs de competición separados por coma (vacío = todas)'
        required: false
        default: ''
      scrape_only:
        description: 'true = solo scrapear y commitear el raw JSON (import/verify/publish en local)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Scrape Benjamin + Prebenjamin 2024-2025
        env:
          SCRAPE_IDS: ${{ github.event.inputs.ids }}
        run: python3 scripts/fetch_fiflp_2425.py
        timeout-minutes: 130

      - name: Importar a DB y regenerar JS
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          python3 scripts/import_fiflp_2425.py
          # FIFLP solo expone parte de los partidos jugados — Wayback de
          # futbolaspalmas.com los tiene completos. Re-importar Wayback
          # encima recupera los played counts que FIFLP sobrescribió.
          # Ambos importadores llevan guard de no-regresión (db.existing_played_count):
          # solo sobrescriben un grupo cuando el scrape trae estrictamente
          # más partidos jugados, así que el orden FIFLP->Wayback se queda
          # con el máximo de completitud de cada fuente sin pisar lo bueno.
          python3 scripts/import_wayback_2425.py
          # Knockout tournaments (Copa de Campeones) don't have native
          # standings — synthesize them from match results so each cup card
          # shows champion/finalist/etc ordering.
          python3 scripts/synth_copa_campeones.py
          python3 scripts/generate_js.py

      - name: Tests (bloquean el commit si fallan)
        if: ${{ github.event.inputs.scrape_only != 'true' }}
        run: |
          pip install pytest pyyaml
          python3 -m pytest scripts/tests/ -q
          node --test scripts/tests/test_*.mjs

      - name: Commit y push
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          # generate_js.py reescribe TODOS los data-*.js (incl.
          # data-matchdetail-keys.js, data-seasons.js, data-season-*.js),
          # bumpea ?v= en index.html y CACHE_NAME en sw.js: glob estable en
          # vez de lista frágil, idéntico en los dos sitios de git add.
          # En scrape_only solo cambia el raw (import/generate saltados) -> git
          # add solo lo modificado: commitea unicamente fiflp_2425_raw.json.
          git add scripts/fiflp_2425_raw.json futbolbase.db \
            'data-*.js' index.html sw.js
          if git diff --cached --quiet; then
            echo "Sin cambios."
          else
            git stash
            git pull --rebase origin main
            git stash pop
            git add scripts/fiflp_2425_raw.json futbolbase.db \
              'data-*.js' index.html sw.js
            git commit -m "data: FIFLP 2024-2025 con resultados completos"
            git push
          fi
