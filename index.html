<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fútbol Base Las Palmas</title>
  <meta name="description" content="Clasificaciones, resultados y estadísticas del fútbol base en Las Palmas de Gran Canaria">
  <meta name="theme-color" content="#0d1117">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <svg class="brand-icon" width="28" height="28"><use href="icons.svg#icon-ball"/></svg>
        <div>
          <h1 class="brand-title">FÚTBOL BASE</h1>
          <span class="brand-subtitle">Las Palmas de Gran Canaria</span>
        </div>
      </div>
      <div class="header-actions">
        <select id="seasonSelect" class="season-select">
          <option value="current">2025/26</option>
        </select>
        <button id="themeToggle" class="theme-btn" title="Cambiar tema" aria-label="Cambiar tema">
          <svg width="18" height="18"><use href="icons.svg#icon-moon"/></svg>
        </button>
      </div>
    </div>

    <div class="cat-toggle">
      <button class="cat-btn active" data-cat="benjamin">BENJAMÍN</button>
      <button class="cat-btn" data-cat="prebenjamin">PREBENJAMÍN</button>
    </div>

    <nav class="section-tabs">
      <button class="section-tab active" data-section="clasif">Clasificación</button>
      <button class="section-tab" data-section="jornadas">Jornadas</button>
      <button class="section-tab" data-section="goleadores">Goleadores</button>
      <button class="section-tab" data-section="isla">Por Isla</button>
      <button class="section-tab" data-section="stats">Estadísticas</button>
      <div class="tab-indicator"></div>
    </nav>
  </header>

  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16"><use href="icons.svg#icon-search"/></svg>
    <input type="text" id="searchInput" class="search-input" placeholder="Buscar equipo..." autocomplete="off">
    <span id="searchCount" class="search-count"></span>
  </div>

  <div class="stats-bar">
    <div class="stat-chip"><span id="statGroups">0</span> grupos</div>
    <div class="stat-chip"><span id="statTeams">0</span> equipos</div>
    <div class="stat-chip"><span id="statMatches">0</span> partidos</div>
  </div>

  <main class="main">
    <div id="sec-clasif" class="section active"></div>
    <div id="sec-jornadas" class="section"></div>
    <div id="sec-goleadores" class="section"></div>
    <div id="sec-isla" class="section"></div>
    <div id="sec-stats" class="section"></div>
  </main>

  <footer class="footer">
    <p>Datos: <a href="https://futbolaspalmas.com" target="_blank" rel="noopener">futbolaspalmas.com</a></p>
    <p class="footer-update">Última actualización: <span id="lastUpdate"></span></p>
  </footer>

  <button class="scroll-top" id="scrollTop" aria-label="Volver arriba">
    <svg width="20" height="20"><use href="icons.svg#icon-arrow-up"/></svg>
  </button>

  <div class="modal-overlay" id="matchModal">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="Cerrar">&times;</button>
      <div id="modalContent"></div>
      <div id="modalBody"></div>
    </div>
  </div>

  <nav class="bottom-tabs">
    <button class="bottom-tab active" data-section="clasif">
      <svg width="20" height="20"><use href="icons.svg#icon-chart"/></svg>
      <span>Clasif.</span>
    </button>
    <button class="bottom-tab" data-section="jornadas">
      <svg width="20" height="20"><use href="icons.svg#icon-calendar"/></svg>
      <span>Jornadas</span>
    </button>
    <button class="bottom-tab" data-section="goleadores">
      <svg width="20" height="20"><use href="icons.svg#icon-trophy"/></svg>
      <span>Goleadores</span>
    </button>
    <button class="bottom-tab" data-section="isla">
      <svg width="20" height="20"><use href="icons.svg#icon-field"/></svg>
      <span>Islas</span>
    </button>
    <button class="bottom-tab" data-section="stats">
      <svg width="20" height="20"><use href="icons.svg#icon-stats"/></svg>
      <span>Stats</span>
    </button>
  </nav>

  <script src="data-benjamin.js"></script>
  <script src="data-prebenjamin.js"></script>
  <script src="data-history.js"></script>
  <script src="data-goleadores.js"></script>
  <script src="data-matchdetail.js"></script>
  <script src="data-shields.js"></script>
  <script src="data-stats.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
