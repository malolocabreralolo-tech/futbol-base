name: Scraping FIFLP

on:
  schedule:
    - cron: '0 5 * * *'    # Cada día a las 05:00 UTC (07:00 hora canaria)
  workflow_dispatch:          # Lanzar manualmente desde GitHub Actions

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias Python
        run: pip install playwright

      - name: Instalar navegador Chromium
        run: playwright install chromium --with-deps

      - name: Scraping FIFLP
        run: python3 scripts/fetch_fiflp.py
        timeout-minutes: 50
        continue-on-error: true   # guardar datos parciales aunque haya error

      - name: Verificar datos obtenidos
        run: python3 scripts/check_fiflp.py

      - name: Importar datos en SQLite DB
        run: python3 scripts/import_fiflp.py

      - name: Regenerar archivos JS
        run: python3 scripts/generate_js.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add scripts/fiflp_raw.json \
                  futbolbase.db \
                  data-benjamin.js \
                  data-prebenjamin.js \
                  data-history.js \
                  data-goleadores.js \
                  data-shields.js \
                  data-stats.js \
                  data-seasons.js \
                  index.html
          if git diff --cached --quiet; then
            echo "Sin cambios que publicar."
          else
            git commit -m "FIFLP update $(date '+%d/%m/%Y %H:%M UTC')"
            git push
            echo "Publicado en GitHub Pages"
          fi
