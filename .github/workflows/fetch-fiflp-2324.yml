name: Fetch FIFLP 2023-2024

on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'IDs de competicion separados por coma (vacio = todas)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install playwright && playwright install chromium --with-deps
      - name: Fetch FIFLP 2023-2024
        env:
          SCRAPE_IDS: ${{ github.event.inputs.ids }}
        run: python3 scripts/fetch_fiflp_2324.py
      - name: Guardar resultado
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scripts/fiflp_2324_raw.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "data: FIFLP 2023-2024 scrape"
            git push
          fi
