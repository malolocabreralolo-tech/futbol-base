name: Fetch Wayback 2023-2024

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch from Wayback Machine
        run: python3 scripts/fetch_wayback_2324.py
      - name: Guardar resultado
        if: always()
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add scripts/wayback_2324_raw.json
          if git diff --cached --quiet; then
            echo "Sin cambios"
          else
            git commit -m "data: Wayback Machine 2023-2024 raw scrape"
            git push
          fi
